<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Change Password</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="config.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 80px;
        }

        .logout {
            padding: 8px 16px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 12px #00000020;
        }

        /* FORM */
        .form-group {
            margin-top: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .form-group button {
            width: 150px;
            padding: 12px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }

        .form-group button:hover {
            background: #047857;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .success {
            color: green;
            margin-top: 10px;
        }
        .header-right {
    display: flex;
    align-items: center;
    gap: 27px;
    font-size: 16px;
}

.header-right a {
    color: #064e3b;
    text-decoration: none;
}

.header-right a:hover {
    text-decoration: underline;
}

    </style>
</head>

<body>

<!-- HEADER (same as dashboard) -->
<div class="header">
    <div class="header-left">
        <img class="header-logo" src="/image/Logo/Opu_Logo.png">
    </div>

    <div class="header-right">
        <span><a href="dashboard.html" style="color:#064e3b; text-decoration:none;">Dashboard</a></span>
        <button class="logout" onclick="vueApp.logout()">Logout</button>
    </div>
</div>


<!-- MAIN APP -->
<div id="app" class="container">
    <h2>Change Password</h2>

    <div class="form-group">
        <input type="password" placeholder="Old Password" v-model="oldPassword" />
    </div>
    <div class="form-group">
        <input type="password" placeholder="New Password" v-model="newPassword" />
    </div>
    <div class="form-group">
        <input type="password" placeholder="Confirm New Password" v-model="confirmPassword" />
    </div>
    <div class="form-group">
        <button @click="changePassword" :disabled="loading">
            {{ loading ? "Updating..." : "Change Password" }}
        </button>
    </div>

    <p class="error" v-if="error">{{ error }}</p>
    <p class="success" v-if="success">{{ success }}</p>
</div>

<script>
const app = Vue.createApp({
    data() {
        return {
            oldPassword: "",
            newPassword: "",
            confirmPassword: "",
            error: "",
            success: "",
            loading: false,
            token: "",
            userId: ""
        };
    },
    methods: {
        async changePassword() {
            this.error = "";
            this.success = "";

            if (!this.oldPassword || !this.newPassword || !this.confirmPassword) {
                this.error = "Please fill all fields.";
                return;
            }

            if (this.newPassword !== this.confirmPassword) {
                this.error = "New password and confirm password do not match.";
                return;
            }

            this.loading = true;

            try {
                const res = await axios.post(
                    CONFIG.BASE_URL + "/ChangePassword",
                    {
                        UserId: this.userId,
                        OldPassword: this.oldPassword,
                        NewPassword: this.newPassword
                    },
                    { headers: { Authorization: "Bearer " + this.token } }
                );

                if (!res.data.isSuccess) {
                    this.error = res.data.message || "Failed to change password.";
                } else {
                    this.success = res.data.message || "Password changed successfully.";
                    this.oldPassword = "";
                    this.newPassword = "";
                    this.confirmPassword = "";
                }

            } catch (err) {
                console.error(err);
                this.error = "Something went wrong.";
            }

            this.loading = false;
        },

        logout() {
            localStorage.removeItem("opu_token");
            localStorage.removeItem("opu_user");
            localStorage.removeItem("opu_role");
            window.location.href = "login.html";
        }
    },
    mounted() {
        this.token = localStorage.getItem("opu_token");
        const user = localStorage.getItem("opu_user");

        if (!this.token || !user) {
            window.location.href = "login.html";
            return;
        }

        this.userId = JSON.parse(user).userId;
    }
});

const vm = app.mount("#app");
window.vueApp = vm; 
</script>

</body>
</html>
