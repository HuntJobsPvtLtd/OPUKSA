<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="config.js"></script>


    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        .login-box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #00000020;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #064e3b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0a9670;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: green;
            margin-top: 10px;
        }
        .logo-img
        {
            height: 100px;
        }
        .img-container {
            text-align: center;
            padding-bottom: 30px;
        }
        h2{
            color: #0a9670;
        }
    </style>
</head>

<body>
    <div class="img-container">
        <img class="logo-img" src="../image/Logo/Opu_Logo.png" alt="">
    </div>

<div id="app" class="login-box">
    <h2>Admin Login</h2>

    <input type="text" placeholder="Email or Mobile" v-model="username" />
    <input type="password" placeholder="Password" v-model="password" />

    <button @click="login" :disabled="loading">
        {{ loading ? "Logging in..." : "Login" }}
    </button>

    <p class="error" v-if="error">{{ error }}</p>
    <p class="success" v-if="success">{{ success }}</p>
</div>

<script>
const app = Vue.createApp({
    data() {
        return {
            username: "",
            password: "",
            loading: false,
            error: "",
            success: ""
        };
    },
    methods: {
        async login() {
            this.error = "";
            this.success = "";
            this.loading = true;

            try {
                const res = await axios.post(
                     CONFIG.BASE_URL + "/Login",
                    {
                        UserName: this.username,
                        Password: this.password
                    }
                );

                const data = res.data;

                if (!data.isSuccess) {
                    this.error = data.message || "Login failed.";
                    this.loading = false;
                    return;
                }

                // Save user details from `returnData` and `token`
                localStorage.setItem("opu_token", data.token);
                localStorage.setItem("opu_user", JSON.stringify(data.returnData));
                localStorage.setItem("opu_role", data.returnData.role);

                this.success = "Login successful. Redirecting...";

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 800);

            } catch (err) {
                this.error = "Something went wrong.";
            }

            this.loading = false;
        }
    }
});

app.mount("#app");
</script>

</body>
</html>
